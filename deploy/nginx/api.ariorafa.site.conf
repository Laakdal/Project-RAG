# nginx reverse proxy for the Project RAG backend.
# Copy to /etc/nginx/sites-available/ and symlink into sites-enabled/, then run
# `certbot --nginx -d api.ariorafa.site` — certbot rewrites this to add the
# TLS (443) server block automatically.

server {
    listen 80;
    listen [::]:80;
    server_name api.ariorafa.site;

    # Backend container is published on 127.0.0.1:4000 (see docker-compose.vps.yml).
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # The backend trusts this to set Secure cookies (app.set('trust proxy', 1)).
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming-friendly (for the future chat SSE path).
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
