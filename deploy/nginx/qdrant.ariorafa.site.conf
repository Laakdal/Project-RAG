# nginx reverse proxy for Qdrant, exposed so the relocated n8n
# (https://n8n.anxietypha.my.id) can reach it across VPSes.
# Copy to /etc/nginx/sites-available/ and symlink into sites-enabled/, then run
# `certbot --nginx -d qdrant.ariorafa.site` to add the TLS (443) block.
#
# SECURITY: Qdrant has NO auth of its own here — it is protected by (1) the
# QDRANT__SERVICE__API_KEY that n8n must send as the `api-key` header, and
# (2) the firewall. Do NOT publish Qdrant's 6333 to 0.0.0.0 as well; keep it
# bound to 127.0.0.1 so this proxy is the only way in.

server {
    listen 80;
    listen [::]:80;
    server_name qdrant.ariorafa.site;

    # Qdrant REST API must be published on 127.0.0.1:6333 in the stack compose.
    location / {
        proxy_pass http://127.0.0.1:6333;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Vector payloads can be large; don't buffer or prematurely time out.
        proxy_buffering off;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }
}
