# nginx reverse proxy for the Project RAG frontend.
# Copy to /etc/nginx/sites-available/ and symlink into sites-enabled/, then run
# `certbot --nginx -d ariorafa.site` — certbot rewrites this to add the TLS (443)
# server block automatically.

server {
    listen 80;
    listen [::]:80;
    server_name ariorafa.site;

    # Chat uploads proxy through to the backend's 50 MB limit; allow headroom.
    client_max_body_size 60m;

    # Frontend container is published on 127.0.0.1:3000 (see docker-compose.frontend.vps.yml).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large uploads pass through Next's proxy (600s proxyTimeout) to the
        # backend; keep nginx from aborting them mid-stream.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
