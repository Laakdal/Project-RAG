# n8n can later join this stack by attaching a service to the "appnet" network.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-project_rag}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-project_rag}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "4000:4000"
    networks:
      - appnet

volumes:
  pgdata:

networks:
  # Shared network so additional services (e.g. n8n) can be attached later.
  appnet:
    driver: bridge
