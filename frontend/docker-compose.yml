# Frontend-only stack (no backend). Build + run with:
#   docker compose up --build
# Then open http://localhost:3000 — you land on /login.
#
# When a backend exists, set NEXT_PUBLIC_API_BASE_URL below (it is baked in at
# BUILD time, so change it and rebuild with `docker compose up --build`).
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    image: pipeshub-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
