# Frontend-only stack (no backend). Build + run with:
#   docker compose up --build
# Then open http://localhost:3000.
#
# NEXT_PUBLIC_* values are inlined at BUILD time, so change them here and rebuild
# (`docker compose up --build`):
#   NEXT_PUBLIC_API_BASE_URL     point the app at a backend (empty = none)
#   NEXT_PUBLIC_DEV_BYPASS_AUTH  "1" = skip login + show the UI without a backend
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
        NEXT_PUBLIC_DEV_BYPASS_AUTH: "1"
    image: frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
